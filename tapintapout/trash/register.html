<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tap in Tap Out | Create Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font: Poppins (same as login) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><!--[web:54]-->

  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #facc15;
      --bg-dark: #0f172a;
      --card-bg: #ffffff;
      --border-soft: #e2e8f0;
      --error: #b91c1c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #0f172a;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 480px;
    }

    .auth-card {
      background: var(--card-bg);
      padding: 2rem 2.4rem;
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(15,23,42,0.45);
      border: 1px solid rgba(226,232,240,0.8);
    }

    .auth-header {
      margin-bottom: 1.3rem;
      text-align: left;
    }

    .auth-header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .auth-header p {
      font-size: 0.9rem;
      color: #64748b;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border-radius: 999px;
      padding: 0.18rem 0.7rem;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 0.7rem;
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
    }

    form {
      margin-top: 0.4rem;
    }

    .form-group {
      margin-bottom: 0.85rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: #475569;
      margin-bottom: 0.35rem;
    }

    .input-field,
    .select-field {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border-radius: 11px;
      border: 1px solid var(--border-soft);
      font-size: 0.85rem;
      outline: none;
      background-color: #f9fafb;
      transition: border 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .input-field:focus,
    .select-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(37,99,235,0.2);
      background-color: #ffffff;
    }

    .input-field::placeholder {
      color: #94a3b8;
    }

    .two-cols {
      display: flex;
      gap: 0.75rem;
    }

    .error-text {
      color: var(--error);
      font-size: 0.74rem;
      margin-top: 0.18rem;
      min-height: 0.9rem;
    }

    .btn-primary {
      width: 100%;
      border: none;
      outline: none;
      padding: 0.72rem 0.9rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
      box-shadow: 0 14px 35px rgba(37,99,235,0.45);
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
    }

    .btn-primary:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
      box-shadow: 0 20px 45px rgba(30,64,175,0.55);
    }

    .btn-primary span {
      font-size: 1rem;
    }

    .meta-text {
      margin-top: 0.9rem;
      font-size: 0.8rem;
      color: #6b7280;
      text-align: center;
    }

    .meta-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .meta-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 1.6rem 1.5rem;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <section class="auth-card">
      <div class="auth-header">
        <div class="badge">
          <span class="badge-dot"></span>
          Create your account
        </div>
        <h1>Join Tap in Tap Out</h1>
        <p>Register as a passenger to tap in, tap out, and manage your journeys.</p>
      </div>

      <form id="registerForm" method="post" action="register.php">
        <div class="form-group two-cols">
          <div>
            <label for="first_name">First name</label>
            <input type="text" id="first_name" name="first_name" class="input-field" placeholder="John" required>
            <div class="error-text" id="firstNameError"></div>
          </div>
          <div>
            <label for="last_name">Last name</label>
            <input type="text" id="last_name" name="last_name" class="input-field" placeholder="Doe" required>
            <div class="error-text" id="lastNameError"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" class="input-field" placeholder="you@example.com" required>
          <div class="error-text" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="input-field"
            placeholder="Create a strong password"
            minlength="6"
            required
          >
          <div class="error-text" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm password</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            class="input-field"
            placeholder="Re-type your password"
            minlength="6"
            required
          >
          <div class="error-text" id="confirmPasswordError"></div>
        </div>

        <div class="form-group">
          <label for="role">Account type</label>
          <select id="role" name="role" class="select-field" required>
            <option value="user" selected>Passenger</option>
            <!-- you can add admin/moderator options only for internal use -->
          </select>
          <div class="error-text" id="roleError"></div>
        </div>

        <button type="submit" class="btn-primary">
          Create account
          <span>✓</span>
        </button>

        <p class="meta-text">
          Already have an account?
          <a href="login.html">Back to login</a>
        </p>
      </form>
    </section>
  </div>

  <script>
    const regForm = document.getElementById('registerForm');

    const firstName = document.getElementById('first_name');
    const lastName = document.getElementById('last_name');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');

    const firstNameError = document.getElementById('firstNameError');
    const lastNameError = document.getElementById('lastNameError');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const confirmPasswordError = document.getElementById('confirmPasswordError');

    regForm.addEventListener('submit', function (e) {
      let valid = true;

      firstNameError.textContent = '';
      lastNameError.textContent = '';
      emailError.textContent = '';
      passwordError.textContent = '';
      confirmPasswordError.textContent = '';

      if (firstName.value.trim().length < 2) {
        firstNameError.textContent = 'Enter at least 2 characters.';
        valid = false;
      }

      if (lastName.value.trim().length < 2) {
        lastNameError.textContent = 'Enter at least 2 characters.';
        valid = false;
      }

      if (!email.value.includes('@')) {
        emailError.textContent = 'Please enter a valid email address.';
        valid = false;
      }

      if (password.value.trim().length < 6) {
        passwordError.textContent = 'Password must be at least 6 characters long.';
        valid = false;
      }

      if (confirmPassword.value !== password.value) {
        confirmPasswordError.textContent = 'Passwords do not match.';
        valid = false;
      }

      if (!valid) {
        e.preventDefault();
      }
    });
  </script>

</body>
</html>
